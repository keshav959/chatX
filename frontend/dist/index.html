<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatX</title>
    <script type="module" crossorigin src="/assets/index-KzELmxpy.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DnlE9KYU.css">
  </head>
  <body>
    <div id="root">Loading ChatX…</div>
    <script>
      (function () {
        function showError(message) {
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML = "<div style='padding:24px;font-family:monospace;color:#b91c1c;'>" +
            "App failed to load. " + message + "</div>";
        }
        window.addEventListener("error", function (e) {
          showError(e && e.message ? e.message : "Unknown error");
        });
        window.addEventListener("unhandledrejection", function (e) {
          showError(e && e.reason ? e.reason : "Unhandled promise rejection");
        });
      })();
    </script>
  </body>
</html>
